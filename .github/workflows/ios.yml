name: ios

on:
  push:
    branches: [main]
    paths: ["mobile/ios/**", ".github/workflows/ios.yml"]
  pull_request:
    paths: ["mobile/ios/**", ".github/workflows/ios.yml"]

jobs:
  package:
    # WaldoKit (specs/004-ios-client.md) — the SPM package holding ALL iOS logic + the design
    # system — builds & tests on a real macOS/Xcode runner. This is real CI (not a structure
    # check): a genuine `swift build` + `swift test` gate for every PR touching mobile/ios/.
    name: ios-package
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile/ios/WaldoKit
    steps:
      - uses: actions/checkout@v4
      # H1 CI note (2026-07-20): this runner's default active developer directory can select
      # an Xcode whose compiler (Swift 5.10) is older than the Command Line Tools' bundled
      # `Testing.framework` (built with Swift 6.0.3) — "this SDK is not supported by the
      # compiler". Explicitly select the newest available Xcode 16.x before building.
      - name: select a Swift-6-capable Xcode
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode 16.x found on this runner. Available Xcode installs:"
            ls -d /Applications/Xcode*.app 2>/dev/null
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  build:
    # Unique job name: required status checks match on job names, and "build" would
    # collide with the android workflow's job.
    name: ios-build
    # Structure check runs on ubuntu (cheap); switch to macos-14 when the Xcode project exists.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Structure check only — the WheresWaldo.xcodeproj app target does not exist yet (specs/004
      # §1.1: hand-authoring a project.pbxproj with no Xcode available to validate it is worse
      # than not shipping one; create it in Xcode once available). The WaldoKit package itself is
      # real-CI-tested by the `package` job above.
      - name: structure check
        run: |
          test -f mobile/ios/README.md
          test -f mobile/ios/.gitignore
          test -f mobile/ios/WaldoKit/Package.swift
          test -f mobile/ios/WheresWaldo/WheresWaldoApp.swift
          test -f mobile/ios/WheresWaldo/RootView.swift
          test -f mobile/ios/WheresWaldo/Info.plist
          echo "ios scaffold OK (WaldoKit package is real-CI-tested by the 'package' job; no Xcode project yet)"
      # TODO(session-ios): replace the structure check with the real app-target build once the
      # Xcode project exists. Runs on macos-14. Expected shape:
      #
      # - name: unit tests
      #   run: xcodebuild test -scheme WheresWaldo -destination 'platform=iOS Simulator,name=iPhone 15'
      #   working-directory: mobile/ios
      # - name: archive + sign (main only)
      #   run: xcodebuild archive -scheme WheresWaldo ...
      #   env:
      #     CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
      #     CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      #     PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
