name: backend

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  # Deliberately NO path filter on pull_request: test+mutation are required checks on
  # main, and a path-filtered workflow never reports its checks on non-matching PRs —
  # every docs/mobile PR would hang on "Expected — waiting for status".
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: backend/coverage/
          if-no-files-found: ignore

  mutation:
    name: mutation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Stryker exits non-zero below thresholds.break — that IS the gate.
      # Skipped only while no tests exist yet (pre-TDD scaffold state).
      - name: mutation gate
        run: |
          if find test -name '*.test.ts' 2>/dev/null | grep -q .; then
            npm run mutation
          else
            echo "::notice::no tests yet — mutation gate skipped (scaffold state)"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: backend/reports/mutation/
          if-no-files-found: ignore

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [test, mutation]
    # Deploys only from main pushes, and only once Azure is provisioned
    # (docs/azure-setup.md) and the repo variables below are set.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AZURE_CLIENT_ID != ''
    permissions:
      id-token: write # OIDC federated credential — no publish-profile secrets
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm prune --omit=dev
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: backend
