name: android

on:
  push:
    branches: [main]
    paths: ["mobile/android/**", ".github/workflows/android.yml"]
  pull_request:
    paths: ["mobile/android/**", ".github/workflows/android.yml"]

jobs:
  build:
    # Unique job name: required status checks match on job names, and "build" would
    # collide with the ios workflow's job.
    name: android-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Structure check only — the app does not exist yet.
      - name: structure check
        run: |
          test -f mobile/android/README.md
          test -f mobile/android/.gitignore
          echo "android scaffold OK (no buildable project yet)"
