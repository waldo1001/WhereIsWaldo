name: android

on:
  push:
    branches: [main]
    paths: ["mobile/android/**", ".github/workflows/android.yml"]
  pull_request:
    paths: ["mobile/android/**", ".github/workflows/android.yml"]

# Least privilege (docs/security-review-checklist.md §2): this workflow only checks out,
# builds, and runs unit tests — no deploy, no write access needed.
permissions:
  contents: read

jobs:
  build:
    # Unique job name: required status checks match on job names, and "build" would
    # collide with the ios workflow's job.
    name: android-build
    runs-on: ubuntu-latest
    # A7 (docs/store-readiness.md §1): the four release-signing secrets are mapped to job-level
    # env here — a step's `if:` cannot read `secrets.*` directly, and cannot read env vars set in
    # its *own* `env:` block (only workflow/job-level env is visible to a step's own `if:`), so
    # job-level is the only place this works. On forks/external PRs, and before H5 provisions the
    # real secrets, these are empty strings (not missing) — every `if:` below checks `!= ''`.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      # Structure check — cheap, always valid regardless of the Gradle project's state.
      - name: structure check
        run: |
          test -f mobile/android/README.md
          test -f mobile/android/.gitignore
          test -f mobile/android/settings.gradle.kts
          echo "android scaffold OK"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # A1 (specs/003-android-client.md §13.4) deliberately did not commit gradlew /
      # gradle-wrapper.jar — no JDK/Gradle toolchain existed in that sandbox to produce a
      # verified one. `gradle-version` installs Gradle directly instead of relying on a
      # committed wrapper; the step below then generates the wrapper for any later local use.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: generate Gradle wrapper
        working-directory: mobile/android
        run: gradle wrapper --gradle-version 9.4.1 --distribution-type bin
      # H1 (specs/003 §13): the google-services Gradle plugin (app/build.gradle.kts) requires
      # app/google-services.json to be present at build time. The REAL file (from the Firebase
      # console) is gitignored and only ever exists on a developer's machine — CI needs a
      # structurally valid placeholder so the plugin's package-name check succeeds without a real
      # Firebase project. Obviously-fake values throughout (docs/security-review-checklist.md
      # §1's "placeholders MUST be obviously fake" — no `AIza…` prefix, which the checklist's own
      # secret-scan grep matches); this file never authenticates against anything real.
      - name: generate placeholder google-services.json
        working-directory: mobile/android
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "waldo-ci-placeholder",
              "storage_bucket": "waldo-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "com.whereswaldo.android" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "CI-PLACEHOLDER-NOT-A-REAL-API-KEY" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON
      - name: unit tests
        working-directory: mobile/android
        run: ./gradlew test
      # A7 (docs/store-readiness.md §1): release signing. H5 provisions the real keystore/secrets
      # in GitHub's secret store; until then — and always on PRs, which never need a signed build —
      # `ANDROID_KEYSTORE_BASE64` is empty and these steps are skipped, so the workflow never fails
      # for lack of a secret it can't have yet. Gated to `main` pushes too (not just secret
      # presence): same-repo PR branches DO have secrets access, but a signed artifact is only
      # ever produced from `main`.
      - name: decode release keystore
        if: env.ANDROID_KEYSTORE_BASE64 != '' && github.ref == 'refs/heads/main'
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
      - name: assemble (signed on main)
        if: env.ANDROID_KEYSTORE_BASE64 != '' && github.ref == 'refs/heads/main'
        working-directory: mobile/android
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
      # Always runs (even if assemble failed) so the decoded keystore never lingers on the runner;
      # a no-op when the step above didn't run (rm -f on a nonexistent path).
      - name: clean up decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
