name: web-join

# specs/007-public-join-links.md §5 — deploys web/join/** (the join-link landing page +
# .well-known association files) to the Azure Static Web App provisioned by task H4
# (docs/azure-setup.md §7). Path-filtered on both triggers: unlike backend.yml, this
# workflow's checks are never required on PRs that don't touch web/join/, so a path
# filter here can't leave an unrelated PR waiting on a check that never reports.
on:
  push:
    branches: [main]
    paths: ["web/join/**", ".github/workflows/web-join.yml"]
  pull_request:
    paths: ["web/join/**", ".github/workflows/web-join.yml"]

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: validate .well-known + config JSON (specs/007 §3, §5)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('web/join/.well-known/assetlinks.json', 'utf8')); console.log('assetlinks.json OK')"
          node -e "JSON.parse(require('fs').readFileSync('web/join/.well-known/apple-app-site-association', 'utf8')); console.log('apple-app-site-association OK')"
          node -e "JSON.parse(require('fs').readFileSync('web/join/staticwebapp.config.json', 'utf8')); console.log('staticwebapp.config.json OK')"

      - name: landing page security invariants (specs/007 §2, §7)
        run: web/join/verify-static-security.sh

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: verify
    # Deploys only from main pushes, and only once the join-link SWA is provisioned
    # (docs/azure-setup.md §7, task H4) and the repo variables below are set.
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      vars.AZURE_CLIENT_ID != '' && vars.AZURE_STATICWEBAPP_NAME != ''
    permissions:
      id-token: write # OIDC federated credential — no long-lived SWA token ever stored
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # specs/007 §5 — no long-lived secret stored anywhere: the SWA deployment token is
      # fetched fresh from Azure on every run (docs/azure-setup.md §7 step 2 grants this
      # workflow's OIDC principal the role needed to read it) and masked immediately so it
      # never appears in logs; it's passed to the deploy step only in-memory via a job
      # output, never written to disk or to any file in the workspace.
      - name: fetch SWA deployment token (run-time only, never stored)
        id: swa_token
        run: |
          token=$(az staticwebapp secrets list \
            --name "$AZURE_STATICWEBAPP_NAME" \
            --resource-group "$AZURE_STATICWEBAPP_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
        env:
          AZURE_STATICWEBAPP_NAME: ${{ vars.AZURE_STATICWEBAPP_NAME }}
          AZURE_STATICWEBAPP_RESOURCE_GROUP: ${{ vars.AZURE_STATICWEBAPP_RESOURCE_GROUP }}

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: upload
          app_location: web/join
          output_location: ""
          skip_app_build: true
